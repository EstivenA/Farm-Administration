<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Alimentación</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Editar Alimentación</h2>

    <form th:action="@{'/admin/alimentacion/editar/' + ${alimentacion.id}}" th:object="${alimentacion}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <input type="text" th:field="*{descripcion}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Dosis</label>
            <input type="text" th:field="*{dosis}" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Guardar cambios</button>
        <a href="/admin/alimentacion" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
