<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Alimentación</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Listado de Alimentación</h2>

    <a href="/admin/alimentacion/nuevo" class="btn btn-primary mb-3">Añadir Alimentación</a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Descripción</th>
                <th>Dosis</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ali : ${alimentaciones}">
                <td th:text="${ali.id}"></td>
                <td th:text="${ali.descripcion}"></td>
                <td th:text="${ali.dosis}"></td>
                <td>
                    <a th:href="@{'/admin/alimentacion/editar/' + ${ali.id}}" class="btn btn-warning btn-sm">Editar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/admin/home" class="btn btn-secondary">Volver al inicio</a>
</div>
</body>
</html>
