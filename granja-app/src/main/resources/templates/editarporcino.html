<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Porcino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Editar Porcino</h2>

    <form th:action="@{'/admin/porcinos/editar/' + ${porcino.id}}" th:object="${porcino}" method="post">

        <input type="hidden" th:value="${porcino.id}" name="id"/>
        <input type="hidden" th:value="${porcino.identificacion}" name="identificacion"/>
        <input type="hidden" th:value="${porcino.cliente.id}" name="cliente_id"/>
        <input type="hidden" th:value="${porcino.alimentacion.id}" name="alimentacion_id"/>

        <div class="mb-3">
            <label class="form-label">Identificación</label>
            <input type="text" th:value="${porcino.identificacion}" class="form-control" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Dueño</label>
            <input type="text"
                   th:value="${porcino.cliente.nombre + ' ' + porcino.cliente.apellido}"
                   class="form-control" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Raza</label>
            <input type="text" th:field="*{raza}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Edad</label>
            <input type="number" th:field="*{edad}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Peso</label>
            <input type="number" step="0.01" th:field="*{peso}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Alimentación</label>
            <input type="text" 
                   th:value="${porcino.alimentacion.descripcion}" 
                   class="form-control" readonly>
        </div>

        <button type="submit" class="btn btn-success">Guardar cambios</button>
        <a href="/admin/porcinos" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
