<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel del Cliente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .navbar { background-color: #2c3e50; overflow: hidden; }
        .navbar a { float: left; display: block; color: white; text-align: center; padding: 14px 20px; text-decoration: none; }
        .navbar a:hover { background-color: #34495e; }
        .content { padding: 20px; }
    </style>
</head>
<body>
<div class="navbar">
    <a th:href="@{'/cliente/' + ${cliente.id} + '/porcinos'}">Mis Porcinos</a>
    <a th:href="@{'/cliente/' + ${cliente.id} + '/alimentaciones'}">Alimentacion</a>
    <a th:href="@{/auth/login}">Cerrar sesión</a>
</div>

<div class="content">
    <h1 th:text="'Bienvenido, ' + ${cliente.nombre} + ' ' + ${cliente.apellido}"></h1>
    <p>Aquí puedes consultar la información de tus porcinos registrados.</p>
</div>
</body>
</html>
