<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Informe de Clientes y Porcinos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4">Informe de Clientes y Porcinos</h2>

    <div th:each="cliente : ${clientes}" class="mb-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                Cliente: <span th:text="${cliente.nombre} + ' ' + ${cliente.apellido}"></span>
            </div>
            <div class="card-body">
                <p><strong>Cédula:</strong> <span th:text="${cliente.cedula}"></span></p>
                <p><strong>Dirección:</strong> <span th:text="${cliente.direccion}"></span></p>
                <p><strong>Teléfono:</strong> <span th:text="${cliente.telefono}"></span></p>
                <p><strong>Rol:</strong> <span th:text="${cliente.rol == 1 ? 'ADMIN' : 'CLIENTE'}"></span></p>
            </div>
        </div>

        <h5 class="mt-3">Porcinos de este cliente:</h5>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Identificación</th>
                    <th>Raza</th>
                    <th>Edad</th>
                    <th>Peso</th>
                    <th>Alimentación</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="porcino : ${cliente.porcinos}">
                    <td th:text="${porcino.identificacion}"></td>
                    <td th:text="${porcino.raza}"></td>
                    <td th:text="${porcino.edad}"></td>
                    <td th:text="${porcino.peso}"></td>
                    <td th:text="${porcino.alimentacion.descripcion}"></td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/admin/home" class="btn btn-secondary">Volver al inicio</a>
</div>
</body>
</html>
