<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Navbar */
        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #575757;
        }

        /* Contenido */
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/admin/clientes">Clientes</a>
        <a href="/admin/porcinos">Porcinos</a>
        <a href="/admin/alimentacion">Alimentación</a>
        <a class="nav-link" href="/admin/informeclientes">Informe Clientes</a>
        <a class="nav-link" th:href="@{/admin/clientes/informe}">Generar Informe PDF</a>
        <a href="/auth/login">Cerrar sesión</a>
    </div>

    <div class="content">
        <h1>Bienvenido al Panel de Administración</h1>
        <p>Seleccione una opción en el menú de arriba para ver la información.</p>
    </div>
</body>
</html>
