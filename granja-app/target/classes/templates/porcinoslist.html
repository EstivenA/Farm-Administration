<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Porcinos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Listado de Porcinos</h2>

    <a href="/admin/porcinos/nuevo" class="btn btn-primary mb-3">Añadir Porcino</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Identificación</th>
            <th>Raza</th>
            <th>Edad</th>
            <th>Peso</th>
            <th>Dueño</th>
            <th>Alimentación</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="porcino : ${porcinos}">
            <td th:text="${porcino.identificacion}"></td>
            <td th:text="${porcino.raza}"></td>
            <td th:text="${porcino.edad}"></td>
            <td th:text="${porcino.peso}"></td>
            <td th:text="${porcino.cliente.nombre + ' ' + porcino.cliente.apellido}"></td>
            <td th:text="${porcino.alimentacion.descripcion}"></td>
            <td>
                <a th:href="@{'/admin/porcinos/editar/' + ${porcino.id}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/admin/porcinos/eliminar/' + ${porcino.id}}" 
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Seguro que deseas eliminar este porcino?');">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/admin/home" class="btn btn-secondary">Volver al inicio</a>
</div>
</body>
</html>
