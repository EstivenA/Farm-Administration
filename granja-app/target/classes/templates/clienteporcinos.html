<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Porcinos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="'Porcinos de ' + ${cliente.nombre} + ' ' + ${cliente.apellido}"></h2>

    <a th:href="@{'/cliente/' + ${cliente.id} + '/porcinos/nuevo'}" class="btn btn-primary">
            ➕ Añadir Porcino
        </a>


    <table class="table table-striped">
        <thead>
        <tr>
            <th>Identificación</th>
            <th>Raza</th>
            <th>Edad</th>
            <th>Peso</th>
            <th>Alimentación</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="porcino : ${porcinos}">
            <td th:text="${porcino.identificacion}"></td>
            <td th:text="${porcino.raza}"></td>
            <td th:text="${porcino.edad}"></td>
            <td th:text="${porcino.peso}"></td>
            <td th:text="${porcino.alimentacion.descripcion}"></td>
            <td>
                <a th:href="@{'/cliente/' + ${cliente.id} + '/porcinos/editar/' + ${porcino.id}}" class="btn btn-warning btn-sm">Editar</a>
            </td>
            <td>
                <a th:href="@{'/cliente/' + ${cliente.id} + '/porcinos/eliminar/' + ${porcino.id}}" 
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Seguro que deseas eliminar este porcino?');">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{'/cliente/home/' + ${cliente.id}}" class="btn btn-secondary">Volver al inicio</a>
</div>
</body>
</html>
