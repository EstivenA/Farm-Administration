<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Porcino</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Registrar Nuevo Porcino</h2>

    <form th:action="@{/admin/porcinos/nuevo}" th:object="${porcino}" method="post">

        <div class="mb-3">
            <label class="form-label">Identificación</label>
            <input type="text" th:field="*{identificacion}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Raza</label>
            <input type="text" th:field="*{raza}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Edad</label>
            <input type="number" th:field="*{edad}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Peso</label>
            <input type="number" th:field="*{peso}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Dueño</label>
            <select name="cliente_id" class="form-select" required>
                <option value="" disabled selected>Seleccione un dueño</option>
                <option th:each="cli : ${clientes}"
                        th:value="${cli.id}"
                        th:text="${cli.nombre + ' ' + cli.apellido}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Alimentación</label>
            <select name="alimentacion_id" class="form-select" required>
                <option value="" disabled selected>Seleccione una alimentación</option>
                <option th:each="ali : ${alimentaciones}"
                        th:value="${ali.id}"
                        th:text="${ali.descripcion}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="/admin/porcinos" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
